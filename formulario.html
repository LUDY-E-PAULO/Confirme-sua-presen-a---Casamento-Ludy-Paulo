<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulário de Presença</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c;
      --dark: #0d0d0d;
      --cream: #f5f0e8;
      --input-bg: rgba(245,240,232,0.06);
      --border: rgba(201,168,76,0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--dark);
      color: var(--cream);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 10%, rgba(201,168,76,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 90%, rgba(201,168,76,0.07) 0%, transparent 55%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 20px;
      border: 1px solid rgba(201,168,76,0.18);
      pointer-events: none;
    }

    .card {
      background: rgba(20,18,14,0.92);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 4px;
      padding: 52px 44px;
      max-width: 480px;
      width: 100%;
      position: relative;
      z-index: 1;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      animation: appear 0.8s ease forwards;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Canto decorativo */
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 32px; height: 32px;
      border-top: 2px solid var(--gold);
      border-left: 2px solid var(--gold);
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 32px; height: 32px;
      border-bottom: 2px solid var(--gold);
      border-right: 2px solid var(--gold);
    }

    .tag {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.75;
      margin-bottom: 14px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--cream);
      line-height: 1.15;
      margin-bottom: 6px;
    }

    h2 span { color: var(--gold); }

    .desc {
      font-size: 0.85rem;
      font-weight: 300;
      color: rgba(245,240,232,0.5);
      margin-bottom: 36px;
      letter-spacing: 0.5px;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      opacity: 0.5;
      margin: 0 0 36px 0;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
      opacity: 0.8;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      padding: 13px 16px;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
      margin-bottom: 26px;
    }

    input::placeholder { color: rgba(245,240,232,0.25); }

    input:focus {
      border-color: var(--gold);
      background: rgba(201,168,76,0.05);
    }

    /* Botão */
    button {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: var(--dark);
      border: none;
      font-family: 'Lato', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: opacity 0.25s, transform 0.15s;
      margin-top: 6px;
    }

    button:hover  { opacity: 0.88; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Mensagem de sucesso */
    #success {
      display: none;
      text-align: center;
      padding: 20px 0 0;
    }

    #success .icon {
      font-size: 2.4rem;
      margin-bottom: 14px;
    }

    #success h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--gold);
      margin-bottom: 8px;
    }

    #success p {
      font-size: 0.85rem;
      color: rgba(245,240,232,0.55);
      font-weight: 300;
      line-height: 1.6;
    }

    /* Aviso de integração */
    .note {
      margin-top: 32px;
      font-size: 0.72rem;
      color: rgba(245,240,232,0.25);
      letter-spacing: 0.5px;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="card">
  <p class="tag">✦ Lista de Presença ✦</p>
  <h2>Registre sua<br/><span>Presença</span></h2>
  <p class="desc">Preencha os dados abaixo para confirmar sua participação.</p>
  <div class="divider"></div>

  <div id="form-area">
    <label for="nomes">Nome(s)</label>
    <input type="text" id="nomes" placeholder="Digite o(s) nome(s) completo(s)"/>

    <label for="email">E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com"/>

    <button id="btn" onclick="confirmar()">Confirme sua Presença</button>
  </div>

  <div id="success">
    <div class="icon">✦</div>
    <h3>Presença Confirmada!</h3>
    <p>Obrigado pela confirmação.<br/>Sua presença foi registrada com sucesso.</p>
  </div>

  <p class="note">
    Ao confirmar, seus dados são encaminhados para o organizador do evento.
  </p>
</div>

<script>
  function confirmar() {
    const nomes = document.getElementById('nomes').value.trim();
    const email = document.getElementById('email').value.trim();

    if (!nomes) { alert('Por favor, informe o(s) nome(s).'); return; }
    if (!email || !email.includes('@')) { alert('Por favor, informe um e-mail válido.'); return; }

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    // ── 1. Envia por E-mail via mailto ──────────────────────────────────────
    const assunto = encodeURIComponent('✅ Confirmação de Presença — ' + nomes);
    const corpo   = encodeURIComponent(
      'Nova confirmação de presença recebida!\n\n' +
      'Nome(s): ' + nomes + '\n' +
      'E-mail:  ' + email + '\n\n' +
      '---\nEnviado via formulário de presença.'
    );
    const mailtoLink = `mailto:paulinhocell0900@gmail.com?subject=${assunto}&body=${corpo}`;

    // ── 2. Envia por WhatsApp ─────────────────────────────────────────────
    const mensagem = encodeURIComponent(
      '✅ *Confirmação de Presença*\n\n' +
      '👤 Nome(s): ' + nomes + '\n' +
      '📧 E-mail: '  + email
    );
    // Número sem espaços ou caracteres especiais
    const whatsappLink = `https://wa.me/5521983452700?text=${mensagem}`;

    // Abre o cliente de e-mail
    window.location.href = mailtoLink;

    // Após 1.5s abre o WhatsApp em nova aba
    setTimeout(() => {
      window.open(whatsappLink, '_blank');

      // Exibe mensagem de sucesso
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('success').style.display   = 'block';
    }, 1500);
  }
</script>
</body>
</html>
